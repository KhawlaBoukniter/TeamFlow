<div class="h-full flex flex-col bg-white overflow-hidden page-enter">

    <!-- Toolbar -->
    <div class="h-16 border-b border-gray-200 px-6 flex items-center justify-between bg-white shrink-0">
        <div class="flex items-center gap-4">
            <h2 class="text-lg font-semibold text-gray-900">{{ project?.name || 'Board' }}</h2>
            <span class="text-sm text-gray-500" *ngIf="project?.description">{{ project?.description }}</span>
        </div>

        <div class="flex items-center gap-3">
            <!-- Filters Button -->
            <button
                class="inline-flex items-center gap-2 px-3 py-1.5 text-sm text-gray-700 hover:bg-gray-100 rounded-button transition-colors">
                <mat-icon class="!w-4 !h-4 !text-[16px]">filter_list</mat-icon>
                Filters
            </button>

            <!-- Add Column -->
            <button (click)="openAddColumnDialog()"
                class="inline-flex items-center gap-2 px-3 py-1.5 text-sm text-gray-700 hover:bg-gray-100 rounded-button transition-colors">
                <mat-icon class="!w-4 !h-4 !text-[16px]">view_column</mat-icon>
                Add Column
            </button>

            <!-- Members -->
            <button (click)="openMembersDialog()"
                class="inline-flex items-center gap-2 px-3 py-1.5 text-sm bg-brand text-white hover:bg-brand-hover rounded-button transition-colors btn-press">
                <mat-icon class="!w-4 !h-4 !text-[16px]">group</mat-icon>
                Members
            </button>
        </div>
    </div>

    <!-- Board Canvas -->
    <div class="flex-1 overflow-x-auto overflow-y-hidden bg-gray-50 p-6">

        <!-- Loading Skeleton -->
        <div *ngIf="columns.length === 0" class="flex gap-4 h-full">
            <div class="bg-white border border-gray-200 rounded-lg w-[300px] min-w-[300px] p-4"
                *ngFor="let i of [1,2,3]">
                <div class="skeleton h-5 w-24 mb-4"></div>
                <div class="space-y-2">
                    <div class="skeleton h-20 w-full"></div>
                    <div class="skeleton h-20 w-full"></div>
                </div>
            </div>
        </div>

        <!-- Columns (with DnD) -->
        <div class="flex h-full gap-4 pb-2" *ngIf="columns.length > 0" cdkDropListGroup>

            <div *ngFor="let column of columns"
                class="bg-white border border-gray-200 rounded-lg flex flex-col w-[300px] min-w-[300px] max-h-full">

                <!-- Column Header (Sticky) -->
                <div
                    class="sticky top-0 bg-gray-50 px-4 py-3 border-b border-gray-200 flex items-center justify-between shrink-0">
                    <div class="flex items-center gap-2">
                        <h3 class="text-sm font-semibold text-gray-900">{{ column.name }}</h3>
                        <span class="text-xs text-gray-500">({{ getTasks(column.id).length }})</span>
                    </div>
                    <button class="text-gray-400 hover:text-gray-600 transition-colors opacity-0 pointer-events-none">
                        <mat-icon class="!w-5 !h-5 !text-[20px]">more_vert</mat-icon>
                    </button>
                </div>
                <!-- Tasks List (Scrollable with Drop List) -->
                <div class="flex-1 overflow-y-auto p-3 space-y-2" cdkDropList [cdkDropListData]="getTasks(column.id)"
                    [id]="'col-' + column.id" (cdkDropListDropped)="drop($event, column.id)">

                    <!-- Task Card (MVP with Drag) -->
                    <div *ngFor="let task of getTasks(column.id)" cdkDrag
                        class="bg-white border rounded-lg p-3 hover:shadow-card-hover transition-all duration-200 cursor-grab active:cursor-grabbing group"
                        [ngClass]="{'border-l-4 border-l-red-500': task.isBlocked}">

                        <!-- Title with Edit Button -->
                        <div class="flex items-start justify-between gap-2 mb-2">
                            <h4 class="text-sm font-medium text-gray-900 line-clamp-2 flex-1"
                                (click)="openTaskDetails(task)">
                                {{ task.title }}
                            </h4>
                            <button (click)="$event.stopPropagation(); openEditTask(task)"
                                class="opacity-0 group-hover:opacity-100 transition-opacity shrink-0 p-1 hover:bg-gray-100 rounded">
                                <mat-icon class="!w-4 !h-4 !text-[16px] text-gray-500">edit</mat-icon>
                            </button>
                        </div>

                        <!-- Description (optional) -->
                        <p class="text-xs text-gray-500 mb-2 line-clamp-1" *ngIf="task.description">
                            {{ task.description }}
                        </p>

                        <!-- Meta Row -->
                        <div class="flex items-center gap-2 flex-wrap">
                            <!-- Priority Badge -->
                            <span class="inline-flex items-center gap-1 px-2 py-0.5 rounded text-xs font-medium"
                                [ngClass]="{
                      'bg-green-100 text-green-700': task.priority === 'LOW',
                      'bg-amber-100 text-amber-700': task.priority === 'MEDIUM',
                      'bg-orange-100 text-orange-700': task.priority === 'HIGH'
                    }">
                                <span class="w-1.5 h-1.5 rounded-full" [ngClass]="{
                        'bg-green-500': task.priority === 'LOW',
                        'bg-amber-500': task.priority === 'MEDIUM',
                        'bg-orange-500': task.priority === 'HIGH'
                      }"></span>
                                {{ task.priority }}
                            </span>

                            <!-- Blocked Badge -->
                            <span
                                class="inline-flex items-center px-2 py-0.5 rounded text-xs font-medium bg-red-100 text-red-700"
                                *ngIf="task.isBlocked">
                                🚫 Blocked
                            </span>

                            <!-- Due Date -->
                            <span class="text-xs text-gray-500 ml-auto" *ngIf="task.dueDate">
                                📅 {{ task.dueDate | date:'MMM dd' }}
                            </span>
                        </div>
                    </div>

                    <!-- Add Task Button -->
                    <button (click)="openCreateTask(column.id)"
                        class="w-full py-2 text-sm text-gray-500 hover:text-gray-700 hover:bg-gray-50 rounded-lg border border-dashed border-gray-300 transition-colors flex items-center justify-center gap-1">
                        <mat-icon class="!w-4 !h-4 !text-[16px]">add</mat-icon>
                        Add Task
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
