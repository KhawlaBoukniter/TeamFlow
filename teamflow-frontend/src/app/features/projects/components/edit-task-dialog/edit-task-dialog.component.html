<div class="px-6 py-4 border-b border-gray-200">
    <div class="flex items-center gap-2">
        <mat-icon class="text-indigo-600" style="font-size: 24px; width: 24px; height: 24px;">edit</mat-icon>
        <h2 class="text-lg font-semibold m-0" style="line-height: 24px;">Edit Task</h2>
    </div>
</div>

<form [formGroup]="taskForm" (ngSubmit)="onSubmit()">
    <mat-dialog-content class="flex flex-col gap-5 min-w-[500px]">
        <!-- Title -->
        <mat-form-field appearance="outline" class="w-full">
            <mat-label>Task Title *</mat-label>
            <input matInput formControlName="title" placeholder="Enter task title" required>
            <mat-error *ngIf="taskForm.get('title')?.hasError('required')">
                Title is required
            </mat-error>
            <mat-error *ngIf="taskForm.get('title')?.hasError('minlength')">
                Title must be at least 3 characters
            </mat-error>
        </mat-form-field>

        <!-- Description -->
        <mat-form-field appearance="outline" class="w-full">
            <mat-label>Description</mat-label>
            <textarea matInput formControlName="description" placeholder="Enter task description" rows="3"></textarea>
            <mat-hint>Optional - Add details about the task</mat-hint>
        </mat-form-field>

        <!-- Settings Grid -->
        <div class="grid grid-cols-2 gap-4">
            <!-- Priority -->
            <mat-form-field appearance="outline">
                <mat-label>Priority *</mat-label>
                <mat-select formControlName="priority" required>
                    <mat-option *ngFor="let priority of priorities" [value]="priority">
                        {{ priority }}
                    </mat-option>
                </mat-select>
                <mat-hint>Set importance level</mat-hint>
            </mat-form-field>

            <!-- Due Date -->
            <mat-form-field appearance="outline">
                <mat-label>Due Date</mat-label>
                <input matInput [matDatepicker]="picker" formControlName="dueDate" placeholder="Select due date">
                <mat-datepicker-toggle matIconSuffix [for]="picker"></mat-datepicker-toggle>
                <mat-datepicker #picker></mat-datepicker>
            </mat-form-field>
        </div>

        <!-- Is Blocked -->
        <div class="flex items-center">
            <mat-checkbox formControlName="blocked" color="warn" class="text-gray-700">
                Mark as Blocked
            </mat-checkbox>
        </div>
    </mat-dialog-content>

    <mat-dialog-actions align="end" class="gap-3 px-6 pb-6">
        <button mat-button type="button" (click)="onCancel()">Cancel</button>
        <button mat-raised-button color="primary" type="submit" [disabled]="taskForm.invalid">Update Task</button>
    </mat-dialog-actions>
</form>
