<div class="h-full flex flex-col bg-[#09090b] page-enter overflow-hidden">
    <div class="flex-1 overflow-y-auto custom-scrollbar p-8">

        <div class="header-section">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight mb-2">User Management</h1>
                <p class="text-[#8A8F98]">Manage global accounts, roles and status.</p>
            </div>
            <button mat-flat-button color="primary" (click)="loadUsers()" [disabled]="loading">
                <mat-icon>refresh</mat-icon>
                Refresh
            </button>
        </div>

        <div class="bg-[#1C1C1E] border border-[#2E3035] rounded-xl overflow-hidden shadow-xl">
            <table mat-table [dataSource]="users" class="user-table">

                <!-- ID Column (Hidden usually, keeping for debug) -->
                <ng-container matColumnDef="fullName">
                    <th mat-header-cell *matHeaderCellDef> Name </th>
                    <td mat-cell *matCellDef="let user">
                        <div class="flex flex-col">
                            <span class="font-bold text-white">{{user.fullName}}</span>
                            <span class="text-[10px] text-[#8A8F98]">ID: {{user.id}}</span>
                        </div>
                    </td>
                </ng-container>

                <ng-container matColumnDef="email">
                    <th mat-header-cell *matHeaderCellDef> Email </th>
                    <td mat-cell *matCellDef="let user"> {{user.email}} </td>
                </ng-container>

                <ng-container matColumnDef="role">
                    <th mat-header-cell *matHeaderCellDef> Role </th>
                    <td mat-cell *matCellDef="let user">
                        <span *ngIf="user.isAdmin"
                            class="px-2 py-0.5 rounded-full text-[10px] bg-[#5E6AD2]/20 text-[#5E6AD2] border border-[#5E6AD2]/30 uppercase font-bold">ADMIN</span>
                        <span *ngIf="!user.isAdmin"
                            class="px-2 py-0.5 rounded-full text-[10px] bg-[#8A8F98]/20 text-[#8A8F98] border border-[#8A8F98]/30 uppercase font-bold">MEMBER</span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="status">
                    <th mat-header-cell *matHeaderCellDef> Status </th>
                    <td mat-cell *matCellDef="let user">
                        <span class="flex items-center gap-2">
                            <div class="w-2 h-2 rounded-full" [class.bg-brand]="user.isActive"
                                [class.bg-red-500]="!user.isActive"></div>
                            <span [class.text-brand]="user.isActive" [class.text-red-500]="!user.isActive">
                                {{user.isActive ? 'Active' : 'Inactive'}}
                            </span>
                        </span>
                    </td>
                </ng-container>

                <ng-container matColumnDef="lastLogin">
                    <th mat-header-cell *matHeaderCellDef> Last Login </th>
                    <td mat-cell *matCellDef="let user">
                        {{user.lastLogin ? (user.lastLogin | date:'MMM d, HH:mm') : 'Never'}}
                    </td>
                </ng-container>

                <ng-container matColumnDef="actions">
                    <th mat-header-cell *matHeaderCellDef> </th>
                    <td mat-cell *matCellDef="let user" class="text-right">
                        <div class="flex items-center justify-end gap-1">
                            <button mat-icon-button [matTooltip]="user.isAdmin ? 'Revoke Admin' : 'Grant Admin'"
                                (click)="toggleAdmin(user)">
                                <mat-icon [class.text-[#5E6AD2]]="user.isAdmin">security</mat-icon>
                            </button>
                            <button mat-icon-button [matTooltip]="user.isActive ? 'Deactivate' : 'Activate'"
                                (click)="toggleActive(user)">
                                <mat-icon [class.text-red-400]="user.isActive" [class.text-brand]="!user.isActive">
                                    {{user.isActive ? 'block' : 'check_circle'}}
                                </mat-icon>
                            </button>
                            <button mat-icon-button matTooltip="Delete" color="warn" (click)="deleteUser(user)">
                                <mat-icon>delete</mat-icon>
                            </button>
                        </div>
                    </td>
                </ng-container>

                <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
                <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
            </table>

            <!-- Loading Spinner -->
            <div *ngIf="loading" class="flex justify-center p-8">
                <mat-spinner diameter="40"></mat-spinner>
            </div>

            <!-- Empty State -->
            <div *ngIf="!loading && users.data.length === 0" class="p-20 text-center">
                <p class="text-[#8A8F98]">No users found.</p>
            </div>
        </div>
    </div>
</div>
